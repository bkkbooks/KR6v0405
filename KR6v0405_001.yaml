body:
  text: 中吳沙門空谷景隆述太原王先生名中字克平謂余曰中也聞諸先達曰佛是聖中之至聖佛之教法大道之學也不識晦庵先生之本意何為而排之乞師一言以為啓迪曰據直言之子則有所嫌忌逮欲無言又辜子問但請力學至於擴充之地而無迫隘之量然後彼之短長瞭然可見何待發問而後知乎孟子謂孔子登東山而小魯登泰山而小天下豈不其然歟今夫儒之論道經邦老之歸根復命佛之明心見性皆明道而弘善也書曰為善不同同歸乎治漢牟子曰君子博取衆善以輔其身此之謂也是故達人大觀庶幾明道理識言語烏可死於一人半人之語乎吾輩心宗之學微用文義貫穿道理而已子讀萬卷經書始為通方達士曰非一朝而可造詣吾師於理明切至當得相扣也曰然則為汝隱然指歸令汝自見韓子未知佛法所以排佛及見大顛禪師後𭰹敬佛法晦庵潛心佛學可謂博矣其排佛者心病也苟不排佛則後學多看佛書凡看佛書則見其心病矣由是密設牆塹閒住後學令走不出識不破也曰晦庵牆塹設在何處曰指程子云佛氏之言比之揚墨尤為近理所以其害為左甚令如芭美也以遠之大學中庸序文或問諸書注語晦庵語録皆存此意小學有世俗信浮圖誑誘等語文公家禮喪禮篇有云不作佛事復指司馬溫公語注云世俗信浮誑誘等語全是晦庵心之所之不是溫公之語如是用心是其設牆塹也所以皮膚之學者偏要排佛才讀數十卷書心忿忿然遽以排佛為急務嗚呼學至宏博自然通泰排佛之心稍覺輕矣學而至化出彼墻塹之外自知排佛之非追悔不及矣當知三教之學乃至琴碁書畫百工伎藝學而至於變化之地始得活機之妙不然則在死殺法裡遽伯玉六十而化始得處心之要學而至化卒難得也曰學而至化固難得也且言墻塹誰能出焉曰能出者大儒也未造此地者恬然受其瞞昧而不知爭能出也曰曾有能出者乎曰有簡而言之若屏山李公石塘胡公樂軒陳公希逸林公西山真公海粟馮公松雪趙公須溪劉公德機范公曼石楬公邵庵虞公仲弘楊公大朴危公天錫薩公兼善達公溍鄉黃公廉丈楊公季迪高公歐陽玄公斯道烏公仲舉張公景濂宋公叔能戴公伯溫周公伯昂葉公大章徐公達善王公君羽錢公介山王公性學李公廣孝姚公節庵高公儀之王公子啓曾公等是也司馬溫公與元城劉先生曰佛家言天堂地獄且夫實有此否元城曰佛之設此得入於惡向善耳且鄒衍謂天地之外如神洲赤縣者八九莊子謂六合之外聖人存而不論凡人耳目所不及安知其無溫公動容而服膺自此敬佛溫公手書一卷心經贈僧復題其後云退之排佛而稱大顛外形骸以理自勝且胸中無滯礙由是觀之於佛不為無得而所排者跡耳注出西山讀書記并鳴道集性學辨已而元城曰溫公老先生𭰹知佛法注出元城語録所以資治通鑑未始排佛溫公著大同集解禪偈古文孝經旨解潛虛擬太玄等書皆正直之辭斷無排佛之語文公家禮所注溫公之語虛架而無根矣濂溪二程是佛法中人爭肯排佛溫公程子排佛之言顯是晦庵所造栽於二家名下以為自己排佛之本也道余録𭣣二程子排佛二十八條晦庵排佛二十一條總是晦庵胸中所蘊不是程子見識程子苟存此見爭能著易傳耶易傳辭理俱勝不失東林總禪師濂溪周元公口傳心受之意一模脫出渾無睽舛未嘗有此僻隘之心溫公程子不肯排佛通鑑易傳良可徵也晦庵非惟曲排佛法抑亦曲指溫公程子其名德也曰程子排佛之語出於程子文集豈是晦庵所造曰橫渠與濂溪同問道於東林總禪師今來橫渠西銘正蒙二書皆有排佛之語二書皆是晦庵打點并加注語集為朱子成書西銘正蒙排佛之語未必出於橫渠之口多出晦庵之筆程子文集排佛之語同此籌也橫渠與周子同問道於東林性理群書等文謂橫渠問易於程子噫橫渠年雖少於周子亦是同時人也何不問易於周子𨚫問易於程子此或實事亦未可知或是後人欲尊程子矯立此事亦未可知已而凡書者互此事泛而說之是以此事遍於群書遂為實事豈不見晦庵凡造語要人信伏便指為程子所說嗚呼證龜成此之謂也曰何由知為晦庵之語乎曰言語若認不出何以知人乎曰既謂知人濂溪何人也曰履德君子也故無昧佛之言耳曰誠知人矣夫溫公正人君子二程子慎德君子吾知三子不肯謗佛如保曾參不殺人也通鑑易傳誠為證據曰晦庵非惟排佛抑亦排老此復何如曰其於老子之教初無干涉故不欲排老若獨排佛則有譏議故以二教同而排之謂為排抵諸宗抉樹儒宗而已曾不知天生三教推不向前捺不向後為世摸範不可無也如太空之有天地非天地則無覆載也曰或謂佛學為九流之墨家然否曰子胡不知也九流載於史記漢武帝時司馬相如之所述也此時未有佛法言墨家者墨翟也墨以行事為教耳佛以大道為教統天地三教之極祖也惜相如之不遇乎遇則推尊而尚之必有可觀者也曰佛有兼愛近乎墨也曰慈悲喜捨佛之德也豈是溺情汩志之愛乎慈悲之愛者德也溺情之愛者私也韓昌黎曰博愛之謂仁此流於情而混淆也孔子曰博施於民而能濟衆必也聖乎孟子曰惻隱之心仁之端也孔孟非溺情汩志亦非真妄混淆故可與慈悲之愛相表裡嗚呼儒宗以綱常為先明道兼之釋宗以明道為先綱常兼之衆人觀之似乎不同達人觀之而實同也夫既慈愛於衆以及鳥獸昆蟲者豈不忠於君不孝於親不修道德不弘仁義乎凡如是者未之有也曰晦庵所惡虛無寂之教新安陳氏曰老氏虛無佛氏寂此說何如曰虛無寂有權實二義以權言之則虛無寂是空幻之語凡夫執有小乘執空中乘執不有不空大乘當體即空不隨衆數妙有非有真空不空不立一塵不捨一法縱橫逆順法法全真是故大覺世尊為破凡夫之有故乃曰此身虛幻令心寂為破小乘之空故乃責其陷於解脫𭰹坑令求出離為破中乘之不有不空故乃責其於幻有令求大乘此皆善權方便之術也以實言之則虛無寂是萬有之母出生天地人物動植飛潛而至萬法者也佛教曰從無住本立一切法乃至無有少法可得然燈佛為我授記老子曰道可道非常道名可名非常名無名天地之始萬物有名之母常無欲以觀其妙常有欲以觀其微孔子曰易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此禮曰無為而物成是天道也子思子曰上天之載無色無臭三教聖賢之旨皆是真常寂真空不空初無少異佛說生已寂為樂益令空其妄情也夫天地人物以及萬類皆一氣展縮初無間然展而為陽縮而為隂隂極而陽陽極而隂靜為隂基動為陽體靜極而動動極而靜靜即虛無寂滅也靜極而動即虛無寂中出生萬有也晦庵讀佛書可只見得破凡夫方便語乎可是不識虛無寂滅是萬有之母乎可是不識三教聖賢之旨皆是真空寂滅之理乎可是自欺其心特爾曲說疑誤後學乎所以𢙣佛老為虛無寂之教也其脫於大理豈小小哉佛法自永平十年而來明主名賢莫不推尚為大道之學至於後世之下晦菴𢙣之為虛無寂滅之教且夫晦菴所𢙣果當乎不當乎晦菴識見可逾東漢三國之人物否乎可逾晉宋齊梁陳南北朝之人物否乎太誓曰天視自我民視天聽自我民聽故孔子曰吾從衆未聞從於一己偏意也偏意排佛者余不言其隘而未達也亦不言其知言而未知道也亦不言其才而未德也亦不言其執滯而未圓也亦不言其逢蒙之行也亦不言其私而未公也惟提大意發覺人心請自裁度悟之而已矣曰中也不敏聞師之言亦乃思過半矣孔子作春秋太史公作史記班固作西漢書范曄作東漢書陳壽作三國志唐太宗作晉書李延壽作南北史魏徵作隋書劉昫作唐書司馬溫公少微江公皆作通鑑鄭夾漈作通志馬端臨作文獻通考捐傒斯作宋史李燾作宋鑑曾子野作史略宋景濂作元史皆以天地之心為心是曰是非曰非不存私意諸君史筆如秉龍泉太阿殺人活人無偏無黨佛法大道也可尚不可排苟或可排則太宗諸子已排之矣奚待後世檀其己意者曲排之也若夫竊他人之德為自己之功欲張自己之功故掩他人之德此則逢蒙亦所不忍為也况孔子而至宋子肯為之乎是故春秋以逮元史亘古今窮萬世敬之仰之若天地之高厚日月之昭明豈有剽竊之弊逢蒙之行也唐太宗篤志尚佛逮無加矣玄奘法師沒世之日高宗顧左右曰朕失國寶矣輟朝三日若謂二帝𭰖於佛法然則房玄齡杜如晦魏徵虞世南褚遂良李靖董常諸公何不力諫蓋為君堊臣賢咸知佛法正大之道其有補於政化善利於人所以同遵尚也凡造寺譯經所有記序若非御製則係房杜魏虞諸公所作其文章之謹嚴敬佛之誠篤可謂至矣玄宗肅宗代宗宣宗尚佛㔫甚代宗指南陽忠國師曰國中無寶此僧乃國寶也宋朝太祖太宗真宗仁宗諸堊尚佛其㔫甚焉相國韓公琦侍郎歐陽修張端明祕書開彥長章表民員外郎陳舜俞等未讀佛書末知敬佛逮乎明教嵩禪師并鐔津集一出無不斂枉迭稱讚曰不意僧中有此即非惟空宗通亦乃文格高良史之筆大公之道也諸公自此敬佛後有好佛之甚者禮曰雖有嘉殽弗食不知其味雖有至道弗學不知其善是故學然後知不足教然後知困知不足然後能自反也知困然後能自彊也豈不其然乎自晉以來謝安石才德之量經綸之手孰能加焉王羲之識量高古才思逸群孰能加焉陶淵明性情之正去住之高孰能加焉謝靈運風規瀟灑文章之精孰能加焉崔公群相天下而天下賢之孰能加焉衡陽龐蘊識見之高道學之勝孰能加焉裴晉公樹大勳業著於盛唐孰能加焉顏魯公具大節義文章書法孰能加焉相國裴公休文章之古道學之至孰能加焉二子黃山谷儒學之至禪學之勝孰能加焉陳忠肅公道學政事高識美德孰能加焉狀元王日休博學智識高明正大孰能加焉未暇廣而論之略言此諸名賢篤志尚佛天下孰不知之此諸名賢道德明敏豈不逮於後世排佛之人乎蓋為意誠心正公而無私重於佛堊人之至道也晦庵多注書故後學敬之矧不識其心病故不擇其言皆從其說也曰六經孔孟等書論道論仁處論心論性處晦庵所注契於聖賢之心否曰曲排佛法之言輒為辨明一二而已自餘未暇論之况各家注書各據所見仁者見之謂之仁智者見之謂之智後人或宗於此或宗於彼各因氣運變化隨人氣量之所取也寧用問焉且如皋陶賡歌於前孔子刪詩於後變為騷變為選變為律與夫歌謠吟頌等體漢魏尚高古晉宋尚雅淡唐人尚音律宋人尚性理此亦氣運之變化也毛詩三百篇多有窮夫窮婦之所作其言簡理備後世敻不可及彼窮夫窮婦豈因二十年讀書學力之所至乎蓋為氣運生而然之也元人謂宗於唐詩非於宋詩豈宋詩果不逮於唐乎豈元詩果能逾於宋乎在人好之𢙣之而已李杜長於意唐音重音律有愛李杜者愛唐音者愛平淡者愛奇崛者嗚呼孰為是乎孰為非乎人之氣量不同爾苟執於小節失於國風雅頌之淳溫柔敦厚之實或迷於雕巧麗辭而外乎情性之正如是言詩言之奚益書曰詩言志心之所之既失其正形之於言安得其正焉故學不可不求其正也道不可不求其大也曰余問注書師何以引而不發而言作詩二者皆隱然而未詳何也曰詳備言之則露筋骨選詩補注劉坦之謂李太白詩狂簡不逮杜公坦之惟識杜公之學未識李公之學李公已到化而神妙之地其辭章富麗奇偉奔騰澎湃者才力自然所謂國清才子貴家富産兒嬌豈工于造作雕琢鬪飣而然耶區區後學安可窺測其涯涘哉嗚呼識見之未至妄譭先達之所長得罪於天地乎此妄說之咎也余知此咎是故隱然晦庵既𢙣虛無寂滅又言死者形既朽滅神亦飄散雖有銼燒春磨且無所施此則虛無寂滅至於空蕩無皈矣且如有人臥於武林夢居金陵與彼親友同席飲食是時惟知有此飲食之身不知亦有幻身臥於武林也夢飲食者神識也亦名精魂也凡人思善思惡生死不絶者即此神識也死者受苦銼燒春磨即此神識也是時惟知有此受苦之身不知亦有幻身死於人間也如彼夢飲食者不知亦有幻身臥於武林也當知幻身猶房屋也神識猶屋中之人也人既出之不顧房屋神識既出不顧幻身晦庵所謂形既朽滅神亦飄散雖有銼燒春磨且無所施是則惟見幻身生滅不知神識不消滅也是猶惟知房屋傾頽不知屋中之人先出屋外渾無也此不消滅之神識隨業受報出殼入殼或苦或樂也不知之者神識莾蕩茫然無皈神識尚爾况欲明佛性乎非惟不契佛經抑示深悖書經之旨金縢曰武王有疾周公為三壇告太王王李文王曰惟爾元孫某遭厲虛疾若爾三王是有丕子之責于天以且代某之身豫仁若考能多才多藝能事鬼神若據晦庵所謂雖有銼燒春磨且無所施則周公代武王之死形亦朽滅神亦飄散雖有多才多藝亦無所存將何以事鬼神乎三王亦將何以受周公之告乎禮記孔子曰人死曰鬼此五代之所不變也若謂形既朽滅神亦飄散將何以為鬼乎若以晦庵之言為是也則周公孔子之言為非若以周公孔子之言為是也則晦庵之言為非周公孔子聖人也晦庵文公也汝宜默私意正神明以理推之為何如哉克乎避席而言曰晦庵已歿二百餘年矣未嘗有人針此膏肓之病吾知先德不言者有待吾師發明其蘊也中也聞此幸莫大焉再并而後已曰史書通鑑師既論之矣歐陽修唐書五代史何不言之曰歐陽永叔為史之時未見明教高禪師是以書史亦無敬佛之意及見高師之後始有敬佛之心故跋韓子別傳曰余官琅瑘有以退之別傳相示者反覆論誦乃知大顛蓋非常人余患浮氏之盛而韓退之之說及觀大顛之言乃知子厚不為過也此時歐之書史已行於世矣故不言也曰陳子經宋鑑何不言之曰宋朝一十六主合三百十七年之有天下聖聖尚佛身為帝王心為佛祖傾誠至矣或時敬老子者暫爾而已惟徽宗信於林靈素之言後從老子子經不收宋主尚佛惟收尚老爭奈揭氏宋史李氏宋鑑曾氏史略皆收宋王尚佛行在天下孰能掩之劉向序戰國䇿曰史氏之法具記一時之事辭善𢙣必書初無所決擇劉向可謂知春秋之意焉夫執筆者當以天心為心庶不悖於天理不誤於後學焉可倚靠一人半人之心為心而失天地無私之理耶嗚呼佛之道何如哉老之道何如哉余編尚理編稍亦言之矣其有明理者自識大道之𭰹淺余不復言也晦庵排抵佛老筆於書中其來二百余年矣沮人多少善心了也沮人多少隂德了也日後天地氣數變其說亦未可知姜漸序其鑑曰子經取法乎晦庵綱目嗚呼既宗晦庵只合以佛老同一致也胡為抑佛而揚老乎此又晦庵之罪人也日後或有公而無私者惡其偏見鳴鼓而政之亦未可知也曰卯石南著書何如曰長邑伯者區區好事人耳石南藉邑伯之威而行文藝故屈節稱為邑伯之徒以此為立身之計也凡操文筆依傍晦庵之意初無超出晦庵之意所之書依傍陳子經宋鑑之意亦無超出子經之意故亦不收人主尚佛也噫子之所問姑置之吾亦有所問焉水母以蝦為目凡得蝦輒行之言其行也雖旦至暮不逾一里之遙或失蝦則茫然罔措𩹳鮚以蟹為足凡倚蟹則行之言其行也雖旦至暮不逾三里之遙或失蟹則茫然罔措二物雖得目足之樂有以異乎無以異乎曰無以異也既無異可用知言矣曰孔子之時佛法未至中國孔子知有佛法否曰孔子曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉鬳齊林先生曰此章似當時已有佛之學托夫子之名而尊之也西方之人出於三皇五帝之上非佛而何然則佛之書八於中國雖在漢明帝之時而其說遍傳於天下久矣不治不亂不言自信不化自行此三者實太古之聖道孔子發明此道而無私心惟此一節亦足以見孔子之聖德也佛法苟非大道則孔子已指其非矣安得稱為聖乎佛法教人為善沮惡之言與三綱五常若合符莭實為世人之福田明道之大本也隂翊皇度補於政化之功可謂至矣前宋文帝曰適見顏延之宗炳著論發明佛法甚為名理並是開獎人意若使率土之濱皆感此化朕則坐致太平矣臣何尚之奏對其略曰佛法教人為善也世人能行一善則去一惡去一惡則息一刑一刑息於家萬刑息於國則階下之言坐致太平是也然佛法能為國家省其刑獄又如此也唐書曰雖為異方之教無損於理之源韓愈抵排佛老其道未弘柳子曰佛經與易論語合不與孔子異道雖聖人復生不可得而斥也孝宗曰佛之五戒即五常也仲尼之道夫何遠之有如上等語固合天地之心公而無私也曰師謂佛法教人為善省其刑獄曾不知僧亦有過而煩於刑獄也曰三教堊人之道未始不以善法教人後世以法壞法者未免有之安得人人同一制也是故不可以人之不善而責堊人之教焉汝之所見如禾之不獲而責后稷之教耕也藥之不效而責盧扁之教醫也且夫廢耕可乎廢醫可乎是亦未思之甚也曰論語曰攻乎異端斯害也矣或指佛老為異端此說何如曰異端者雜學也孔子謂習於雜學則害於正道之學直言而已且無蘊奧何以拗直為曲乎孔子存時佛法未至中國孔子惟聞佛之道德故稱西方有聖人漢明帝時佛法才至中國孔子已沒六百年矣是故孔子不見佛法也既不見佛法指佛何法為異端乎佛法既為異端孔子何以指佛為堊人乎老子既為異端孔子何以言曰老聃古知今則吾師也出孔子家語是以問老子之後傳誦其語以示門弟子焉出禮記家語莊列史記等晦庵非惟曲排佛老亦悖孔子崇尚佛老也後世指佛老為異端者圖掩其德設此逢蒙之計也後學自無所燭者未免隨人指呼效而言之喚鐘作甕也一朝學到李屏山林希逸而至景濂大章諸公之地自能識破矣夫佛老者道學也指道學為異端者其為智乎不智乎其為善心乎瞞人乎汝亦學理者猶未識破也詩曰采苓采苓首陽之巔人之為言苟亦無信舍旃舍苟亦無然人之為言胡得焉此之謂也曰師言明矣孔子崇尚佛老諸書具載晦庵排之實悖孔子也吾儕未之思耳余雖未嘗排佛然亦因其排故余亦惑之未克篤敬於佛今也反而思之余害至德甚矣是為大謬痛心疾首悔而追之不可得矣自今而後受佛明教歸依禮敬庶為補過之萬一矣曰僧也不耕而食不蠶而衣豈不坐消民利而減其福積乎曰三教九流而至百氏之家皆係天地使然資其所宜致有之也天生其人亦生其祿貴賤貧富數已分定天理之力大而無敵也密而行之人不可見豈人力能奪天理之力乎其可轉移者有曰皇天無私惟德是輔中國為有三教堊人道德仁義之學故名大國傳繼伏犧神農黃帝堯舜禹湯文武周孔之道特立於天地間是為中國也苟無三教堊人之學則與蠻貊之邦何以別焉三教之子互相排擊者如廉頗忌於藺子也達人大觀三教通行者如藺子不肯兩虎共鬪而克樹國家之大本也曰道德仁義之學吾儒已備何待佛老而後備乎曰道有所司汝未知也孔子之道詳而文老子之道安而謙吾佛之道大而密三教堊人各丁其時出以救世烏可凡情妾窺測也漢牟子曰書不必孔丘之言藥不必扁鵲之方合義者從愈病者良子貢曰夫子何常師之有此之謂也曰孔子曰身體髮膚受之父母不敢毀傷孝之始也孟子曰不孝有三無後為大僧之去髮形絶其所嗣亦悖吾儒乎曰孔孟取之仁義不特取之以跡泰伯遜國而之荊蠻斷髮文身孔子稱其至德未嘗言其不孝伯夷不娶而之首陽孟子稱其堊之清者未嘗言其不孝吾徒為法忘身而取大義也可以報四恩度生死可以弘善道開來學豈不資於大化乎伊尹放大申於桐宮以跡言之則伊尹滅身有余之罪理不可逃也以義言之則致太申密𨒛先王陵墓而生善心令自悟也及其既悟奉歸于毫諸侯皈之以𡸁世無疆之休也如此巧設方便匡成厥德始知伊尹功烈其大矣哉至於微子徉狂比干割腹豫讓吞炭介子焚身經史稱其仁義未聞言其不孝是故取之以義可也取之以跡未可也孟子曰子莫執中執中無推猶執一也斯言善矣曰韓子上佛骨表作原道排抵佛老是故推其有功於吾儒師謂不可排佛似不侔矣曰韓子文章雄健以之為功排佛何足推為功也此時尚書孟簡于頔李翱等豈為無才德而不能排佛乎蓋為識法者懼故不為也言佛之道無勢惟以修道尚德為任其感格天地帝王名公賢宰所推尚者天道自然豈求之而得也言不執勢凡欲排者任彼排之况佛法之在乎帝王臣宰之手欲抑之欲扶之猶握拳展掌而已豈為難乎此時韓子為刑部侍郎而亞卿之蓋亦重矣排此無無敵之道豈為難乎周公輔成王而王天下可謂難矣可謂功矣管仲相桓公一匡天下可謂難矣可謂功矣毛遂一出力拒楚王之威遂令楚王與平原君歃血堅盟定其利害合楚魏之兵以乎強秦之戰致使趙國重於九鼎大呂可謂難矣可謂功矣藺相如皈壁於秦力命秦王擊以配趙主之瑟二者皆以盡忠為心不顧自身有逆龍鱗奪虎食之險可謂難矣可謂功矣魯仲連寸刃不施一言之下卻退秦兵以息伐趙之患可謂難矣可謂功矣文中子進䇿於隋不能用捲而東皈續詩書正禮樂修元經讚易道九年而六經大就中說十卷脫類論語其智識也明其處心也正其進退也宜其門人也皆有王佐之才夫如是可謂難矣可謂功矣房玄齡佐輔唐太宗定天下不矜其功而善皈人亦可謂難矣可謂功矣魏徵危言危行諫爭太宗或有未思之誤匡而定之可謂難矣可謂功矣排佛誰不能之牧兒竈婦皆能排佛何必謂之功也既謂韓子排佛有功汝亦何不效而排之苟排之吾亦無阻晦庵排佛筆於書中亦無阻者晦庵排佛之計有受惑者有不受惑者李屏山而至徐大章等是不受惑者嗚呼吾佛之道繫乎天地豈屬世外之凡情乎曰師謂不可排佛又言凡欲排者任彼排之自相矛盾耶曰言不可排者公論也排則悖於天地之心乎隂德余特憫而救之也或不受救一任排之余無阻也韓子為負英俊有過不復三思勇心排佛及見大顛勇心自息然後𭰹味禪學前之排佛蓋是不知而誤為也後人以禪學性理著書立言然後反行排佛此是知而故為也之中各有前程之定理韓子上佛骨表憲宗皇帝大怒將以抵死裴度崔群等上言哀請乃貶潮列聞郡之靈山寺大顛禪師道德名重三以書請其一曰韓愈啓孟夏漸惟道體和愈弊劣無謂坐事貶官到此盛聞道德切思見顏非到來未獲參謁已怙縣具人船奉迎日夕佇瞻四月七日愈上大顛禪師其二曰愈啓海上窮處無與語者側羕道高思獲披排專特有此咨屈此旬晴明不甚倘能乘間一至實為幸也六月初三日愈白大顛禪師其三曰愈啓慧勻至辱答問珍悚無已所示廣大𭰹逈非造次可量傳曰書不尽言言不盡意然則堊人之意其終不可得而見耶如此而論讀來一百遍不如覿面對之愈聞道無凝滯行無繫苟無所戀則山林間寂與城隍無異大顛師論甚宏而必守山林不至列郭自激修行獨立空曠無纍之地者非通道也勞於一來安于所適道故如是不宣愈頓首大顛禪師七月十五日出舊本韓文有注云大宋重刊韓文欲去此三通書謀夫於歐陽文忠公公曰不可去故存之晦庵挍韓文亦存之不去已後重番晦庵所挍之板剔去之不存矣古略亦收之大顛至郡留數日談論廓達𭰹有契懷次日言及上表謂佛為夷狄之教等事大顛答之其略曰吾聞善觀人者觀其道之所存而不較其所居之地桀紂之君跖蹻之臣皆生中國然不可法者以其無道也舜生於東夷文王生於西夷由余生於戎李札出於蠻彼二堊二賢者豈可謂之夷狄而不法乎子不觀佛之道而徒以為夷狄何言之陋也子必以為上古未有佛而不法耶則孔子孟軻生於𮕱周尤𥌒叟生於上古豈可捨襄周之堊賢而法上古之凶頑哉子以二帝三王之代未有佛而長壽也則外丙二年仲壬四年何其夭耶子以漢陳之間有佛法而人主夭且亂則漢明為一代之英主梁武壽至八十有六豈必皆夭且亂耶子謂儒有言仁義忠信而不知佛之言常樂我淨無以異也子既未讀佛書安知不談先王之法言耶昔者舜犬吠堯非愛舜而𢙣堯也以所常見者唯舜而未嘗見堯也今子常以孔子為學而未嘗讀佛之書遂從而怪之是舜犬之說也佛之與人子言必依於孝與人臣言必依於忠此衆人所共守之言也子今自恃通四海異方之學而文章旁礴孰如姚秦三藏羅什法師乎子之知來藏往孰如晉之佛圖澄法師乎子之盡物不動其心孰如梁之寶公和尚乎韓子默然良久曰不如也大顛曰子之才既不如彼矣彼之從事者佛也而子反以為非然則豈有高才而不知子之所知者耶韓子悔過自此敬佛𭰹好禪學其答孟簡尚書書曰來示云有人傳愈近奉釋氏此傳之者甚也潮冽有一老僧號大顛頗聰明識道理遠地無可與語者故自山召至列郭十數日實能外形骸以理自勝不為事物侵亂與之語雖不盡解要自胸中無滯礙以為難得因與往來及祭神至海上遂造其廬及來袁列衣服為別乃人之情非求福田利益也出韓文舊板今板皆有之韓子哭女詩并序曰去歲自刑部侍郎以罪貶潮列小女道死殯之層峰驛旁山下蒙恩還過其墓題驛梁云數條藤束木皮棺草殯荒山白骨寒驚恐入心身已病扶舁治路衆知難繞墳不暇號三匝設祭惟聞飯一盤致汝無辜由我罪百年慚痛淚闌于出韓文舊板今板皆有之韓子自上表至見大顛講談問禪始未詳備於韓子別傳舊板韓文陳休齊文集朝氏筆記釋氏通鑑佛法編年佛祖通載稽古略傳燈統要金湯編等書今輒引其略耳柳子曰韓退之排佛佛不可排不與孔子異道退之學儒未能過楊子子子之書於莊墨申韓皆有取焉佛法反不及莊墨申韓耶曰以其夷也果不信道而斥焉以夷則將反貴𢙣來盜跖而賤李札由余乎非所謂去名求實者矣陳忠肅公諱瓘字瑩中劍川人公於宣和初奏議其略曰用釋氏之饒益而天下莫與爭用老氏之無為而斯民休息釋氏曰止止勿說老氏曰智者勿言孔氏曰默而識之此祖宗之躬行非有言之士所能議哉出大宋三教奏議并資鑒公序集古録引吾宗棗柏大士之言曰作器者必有檨造車者必合轍古無今有之法即是邪道不可學也三復斯言學道之要不以古堊為檨皆外遊耳有問曰悖理之說古書皆不言千五百載後獨周子言之得非古無今有乎曰否特論者弗知考耳性理之說東林禪師授之濂溪東林已前各專己教未能融會皇宋已來涯禪師倡之始以其詞意發明易中庸之旨非古無今有也出𭸼中録并性孝旨要公早留心於禪學為執聞見以求解會未克發明後參靈源禪師靈源曰離却心意識而參絶却堊凡路而學可也却被逼責無所用心晝夜呆坐而已偶於燕寂間脫然開悟述偈曰書堂兀坐萬機休日暖風和草自誰識二千年遠事如今即在眼睛頭公有此省悟故所論甚明漢人有曰佛經者卷以萬計言以億數非一人所能堪也僕以為煩而不要矣牟子答之其略曰江海所以異於行潦者以其𭰹廣也五嶽所以別於丘陵者以其高大也麒麟不處𫟍囿之中吞舟之𮫭不遊數仞之溪割三寸蚌求明月之珠探枳棘之巢求鳳凰之雛必難獲也客曰佛法至尊世人多病其廓落難用虛無難信也牟子曰至味不合於衆口天音不比於衆耳作咸池設大章發蕭韶詠九成莫之和也張鄭衛之弦歌時俗之音必不期而拊手也夫聞清商而謂之角非彈弦之過𦗟者之不聰矣見和璧而言之石非璧之賤視者之不明矣牟子之言至矣哉夫佛之道大而難入有識者有不識者人之材器不同不足怪也祥符常禪師曰嘗慨資治通鑑稱貞觀中有僧自西域來善咒術能令人立死復咒之令蘇太宗擇飛騎中壯者試之皆驗因以問傳奕奕曰此邪術也臣聞邪不干正請使咒臣必不能行帝命僧咒奕奕初無所覺須僧忽僵仆若為物所擊遂不復此必好事者曲為之辭何則若使果有是則僧非真僧咒非真咒正謂邪術耳固不足以張吾教之疵也而况斷無此理向使彼自西域遠至長安厥術能死人而復蘇乃不暇自能衛其身對常人無故而僵死蜼童莫之信也又當是時京城有大德僧慧乘玄琬法琳明瞻諸公其肯坐視僞僧破壞教門不請峻俗乃留帝命傳奕辦耶佛制戒律雖春蹊生草猶不許比丘踐之恐害其生也况肯說斷人命咒傳於世乎故豫謂好事者曲為之辭斷可見矣出佛祖通載余謂常禪師言之當矣太宗明君也豈不識破彼邪術乎况貞觀之初有道德高僧杜順和尚等十余人續有三藏法師玄奘清凉國師澄觀南山律師道宣等常居輦下太宗朝夕聚詁論道無虛日諸師明通五眼學貫九流擔荷佛法重任者也何不破除邪術而容其馳玩乎傳奕者隋時為黃冠至唐高祖武德八年乙酉從𢈔儉薦為太史丞後升太史令奕上疏排佛前後七次帝皆不報丞相蕭瑀斥之曰佛堊人也奕為此議非堊人者無法請置嚴刑奕乃力爭瑀曰地獄正為此人設也是時法師法琳作破邪論明槩作訣對八條慧乘作辨正論秦主門下典儀李師政作內德論迭加進之皆引大理證奕之非高祖大悅於是奕疏寢息貞觀二年戊子太宗謂奕曰佛道微妙汝獨不悟其理何也奕曰佛是西方夷狄耳帝𢙣其言不答自是終身不齒奕於貞觀十二年庚子秋卒暴而死若謂邪不干正則𫝊奕不識佛堊人之大道是不明也叛老子之教擅己私曲排佛法是無德也夫如是安得為正人乎此事了然可見好事者粧點瑕疵也春秋十二公合國之優劣孔子不加增損惟於片言隻字之間抑揚而已此握史筆之天理也惜乎溫公不加詳審輒𦗟訛傳筆於文籍後世撿點理不可逃也孔子曰堯舜其猶病諸而况溫公安得無失晦庵乘此機便指而言之筆於文公家禮喪禮篇中致令後人不識真僞者益滋於輕薄凡欺心即欺人欺人即欺天安忍為之也君子百行所進殊途同皈胡為汲汲然以排佛為事乎嗚呼佛法之大包羅法界佛法之固重於須割亦無傷撼亦無動彼排之者徒自貽後悔於冥冥之中千佛出世之後亦莫能解釋此結也非惟害己亦纍祖宗悲哉大道涵天地間天下有生莫不具本然之性而與之同一躰用蓋為所心不同而有善𢙣感果優劣之異至難調治者人心也是故三教堊人各出隻手扶持大道互施教法以成天下之化權教人克明此道也孔子以三綱五常為先老子以謙恭慈儉為先釋迦牟尼佛以慈悲方便為先凡能併修三堊之德則此道幾於有成矣缺一堊之教法則化權之道而義不足焉人之於道非一德一善卒以可成要具衆德衆善而後成矣如朝廷有三公九卿五府六部百僚分職各職其政併集百僚之政事克成一國之大治一職則失一政失一政則治化之道而義不足焉三教堊人共弘大道同於此也安可缺其一焉易道也者天地本然之理然微伏羲莫能畫卦微文王莫能演文微周公莫能定爻微孔子莫能翼象至於繫辭說卦等意然後易道粲然明於天下易道體也畫卦用也三堊之言兼體用而發明也缺一堊則易道不明安可秉一堊之言而棄三堊乎三教堊人共弘大道同於此也安可缺其一焉文中子曰詩書盛而秦世非仲尼之罪也虛玄長而晉室亂非老莊之罪也齊戒修而梁國亡非釋迦之罪也易不云乎苟非其人道不虛行或問佛文中子曰堊人文中子可謂知天地間三教之大體也至道冲漠常情難測理固然矣宜乎晦庵昧於佛老之道也楊墨以行事為教無大道之法言孟子非之公非也後世效顰曲排佛老欲求孟子之風較之霄壤夫楊墨一行之士也佛老弘道堊人也佛教曰是法住法位世間相常住老子曰愛民治國能無為乎佛老何嘗棄於綱常之道耶三教堊人鼎立天下司大道之化也既不識佛老之道是不智也曲排佛老是不仁也孔孟之學教人學仁義也讀其書而遺其仁義輒攻於文藝乎恃彼文藝肆於己意而至曲排佛老誤之甚矣喪其心德亦誤後學諸人當自省察而已曰理學類編程子曰釋氏之學極乎高𭰹要之率皈乎自私自利之域此說何如曰佛法以成道為體度人為用佛於三千大千世界無一芥之許不是捨身命救人之地也未能自度先能度人者菩薩之心也惟能自度不能度人者小乘人也是故常被佛責令修大乘世人不知佛法擅其臆說可乎不可乎曰理學類編程子曰堊賢以生死為本分事無所懼故不論死生佛之學為怕死生故只管說不已此說何如曰世人識情繫循環生死莫之能已佛說諸經指而諭之依法修行悟明生死豈是怕生死乎世人只見幻身生死不見佛性不生死不知生從何來死從何去設使欲知赤無所措手是以強說此言修飾而已大似不得飲喫強言不饑也孔子曰未知生焉知死又曰原始反終老子曰皈根復命賈誼曰化為異類王逸少曰死生亦大矣堊賢豈不言生死耶此章問端與前章問端若是程子之語則程子見識自納敗闕矣若是後人謬指程子所說則玷辱之咎其在後人也曰近思録理學類編北溪性理等書皆以凡情度量佛法乞師明辨之曰彼皆不識佛猜忌而已世人之心測度佛堊人境界不啻太空粟粒天地毫芒何足辨也豈不見晦庵臨訣困篤自悔曰到此時節輸與黃面老子一自供欵也蓋欲遮掩心病尽力攔住後學不看佛書意欲滅盡佛法不顯露其心病故作感興詩云誰哉繼三堊為我焚其書噫亦有不受欺瞞攔不住者識破他矣適之所謂希逸林公黃文獻公景濂宋公等是也惜乎後學被前人指昧佛者為道學之傳不昧佛者不為道學之傳如是籠住後學不敢轉動故不識抱德明理正人君子也嗚呼此之智識欲望林黃宋公何異汗池之下望蒼天也苟不能撤藩籬於大方之家破識情於真性之府不免區區於常人言語裡曰排佛者謂傳道學不知所傳何道莫是傳乎瞞人為道耶傳乎昧佛之行為道耶傳乎辭章富廉為道耶傳乎死者形朽滅神飄散如是斷滅之見為道耶曰分復言矣汝讀許多書猶識不破尚滯狐疑可見汝之器量卑微也苟識不破不免𦗟他揆遣憍慢佛堊人以父為讎也
