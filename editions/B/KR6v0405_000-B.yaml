front:
  text: 尚直編序太極既動一氣流行分隂與陽三才肇立謂其太古則邈兮矌兮未暇言之近而言者伏𦏁氏之王天下龍馬出河遂則其文𡱮八卦造書契由是文籍生焉炎帝教耕燧人取火黃帝宮室軒免樂製咸池垂衣裳而天下大治民得遂其生焉唐虞以精一執中之道傳至大禹因神龜負文則之以成洛書而陳九疇商周率由舊章制禮作樂天下政化之道其大備矣周道將衰則有孔子出於魯國適周愽問於老子已而之𣏌之宋力探夏商之法皆不足徵是以從周之道刪詩書正禮樂教人以窮理脩身齊家治國平天下開列莊周發弘老子無為自然之道密符三皇五帝無為之化戰國至秦法出事變不可勝計漢儒雖典文學而道學微矣是故佛法至中國教人為善持戒律身不肯妄進至于明心見性克證本源之道人皆為善減於刑法矣孔子嘗謂西方佛聖人之教不治而不亂其大徵焉詩曰王猶允塞徐方既來此之謂也三教聖人之道天地合德日月兼明大成小成各利其器有若一雨溥㴻草木咸資是道也克輔帝王政治之化其至矣乎自漢至唐以及五季咸爾推之雖嘗變厄皆未幾而復正之宋儒𭰹入禪學以禪學性理著書立言欲皈功於自己所以反行排佛設此暗機令人不識也如是以佛法明捎暗用者無甚於晦菴也然大儒不受其瞞餘人耳受其從其所說効之以排佛嗚呼害乎至德可勝道哉余輙為之痛惜故著尚直編以警之直說而無紆故名尚直也覽者或從是省覺默而識之拔胸次之戈矛補中之隂德遂致天君泰和復其本然之性共沐皇上睿智𭰹明一視同仁之道然則是徧雖亦俚語庶有補於將來者矣正統五年五月既望中吳沙門空谷景隆序
