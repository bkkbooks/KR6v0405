body:
  text: 晦庵謂死者形朽滅神飄散然祭祀是誰受饗耶周禮禮記皆以祭祀為先祭祀之道是虛設耶宜省察之唐太宗早聞武后欲壞其成法故欲殺之袁天罡曰殺之則再生人世怨怒愈𭰹太宗然之故令為尼建立感業寺處之出劉三吳佃鑑惟通鑑畧之天罡謂再生人世怨怒愈𭰹晦庵謂形朽滅神飄散兩家之言天地懸隔孰是孰非夫天罡明理之人也豈眾人可同日而語哉曰宋人謂雷擊者隂陽相激偶尒觸死非特然也此說何如曰驚蟄之後二隂在上四陽在下芒種之後五陽在上一隂在下既隂陽相激雷雨交作則合時時相激雷雨不停何故晴雨間然耶當知二氣交運如轆轤之輪互為上下若相激則安能發育萬物乎日月星辰風雲雷雨皆天地體用各有天神主之應時不忒故有祭天饗地之理風雨均調蒼生善業所感不調時𢙣業所感非上天無慈心也言雷擊者永樂二十二年台列天封寺維那士弘為雷打死頃焉復甦之自言死去見諸天神教誡曰汝先世為巡檢曲罪一夫枉罹極刑汝能奉佛故未償其命後世為住持僧將常住銅錢潛埋三窖死後遂湮沒之二世罪故今誅惟今世奉觀音大士至誠姑存之後至宣德二年溺水而死浙右有人卬造佛天三界紙馬開張店業店屋楣間平鋪閣板作臥室於閣上一夜觸尿器淋漓污馬仍將此馬晒乾賣之本年從店中提出此人雷打死於門前文一貧家夫婦二人有絕糧忍餓之患夫携一鵞入市鬻之得米二斗饑苦迫甚以二升沽酒飲之回至中途醉臥於地被人竊去其米及醒慞惶皈家妻知之不勝哀苦夫乃投水而死妻曰夫既死矣我何存之亦投水而死明日天雷打死一男子擲置於二屍之旁書其背云竊其米者此人也松江有人為雷打死書其背云十年前与一婦人入寺登弟二層行故誅湖列一女子雨中見諸官吏至門前惟二人入其家如世所畫天兵之狀擒女之兄雷打死於門前始知官吏是天神也亦有雷打死者家人以屍衣明日復雷剝去其衣亦有以屍置於棺中明日復雷揭去棺蓋如是顯驗每年有之不復多引此数端目擊耳聞者恐辱其家人故不言其姓名夫是為天誅也亦有蜈蚣狐狸蛇鼠精恠术與器物附托為妖者雷必打之豈是隂陽相激偶尒觸死乎易云震來虩虩象曰洊雷震君子以恐懼脩省蓋言畏天譴故脩省補過也宋人教人不信雷誅𭰹悖易經不懼天地未進其善先喪其德惜乎後人不肯展開大見識照明事法之理惟拘拘然死於宋人之言爾宋人非惟臆說天雷其悖佛過患極甚文中子用孔孟之学書却敬佛法宋人用佛法書却排佛法欲令後学不看佛書庶不識其用佛法著書所以然也宋人於佛法中所得者如以一毫蘸海所得極少以此極少之水令後学取足受用不復入海教壞人心違悖佛法失於大善過莫大焉自有佛法已來昔知皈依進道懺罪脩福是為大善是為大法是為大道是為福田是為大息至於宋李文公家礼沮人供佛飯僧不作佛事從其所說者失諸善利𭰹可憫傷夫漢唐已來唐臣達士皆遵佛法豈非高明賢德乎後人不行者察古今言語之是非故溺於宋人之詭計也宋人常以佛法立言其理便善悖於佛法自立意說者便是平常余有愚徒從文從学皆不能看破嗚呼區區小雛也譬如蚯蚓惟知一尺地中食泥之樂不知蒼龍𭰹躍海淵飛騰在天斥鷃惟知竹籬寸竅左之右之之樂不知大鵬一舉則九里扶搖風斯在下然亦不足恠也囿於器量不能化耳畧言漢唐已來牟子范曄曹植陶潛闞沢房杜魏虞李杜韓柳歐蘓楊傑濂溪等輩得佛法之饒益脫然變化堂堂氣象有大人作畧及乎橫渠程子楊謝羅李晦庵敬夫等輩自意於佛法中已得飽聞將此見識書立言令人不復入佛惟李屏山林希逸馮海栗趙子昂黃溍卿宋景濂徐大章等輩不受其惑能入佛学亦有大人氣象愚徒從文等雖剃髮披緇却被宋人所惑不自省察不得佛法之饒益故無大人氣象范文正公捨宅為寺寺名天平延浮山遠禪師為住持公凢蒞所守之地必造寺度僧興崇佛法賢德之僧必與友善瑯瑘覚禪師悟達之人也公交甚厚夫與瑯瑘浮山二禪伯交𭰹義篤者則知其於佛法道理必𩜈聞矣公之子孫蕃行代代為官迨今不絁苟非佛𭛷田中所植隂德感動天心能若是乎范文正公與司馬溫公友善此時范忠宣公惟侍立而已及登大用却居溫公之上雖有連舟惠麦之德然亦有限若非父子篤敬佛法隂隲所致安能至於是乎古之人事乃躬行道德仁義者也自宋人著書昧佛之後乃舞弄聰明才智者也所以古之人事與今之人事有彼有此也大達君子洞然照見餘人不能見矣要如松雪趙公黃文献公之所見者甚安小学一書晦庵謂死者形朽滅神飄散又言范文正公曰若獨享富貴而不恤宗族異曰何以見祖宗于地下理学類編晦庵又曰死則氣散泯然無跡有托生者是偶然聚得不散又去湊那生氣亦能再生晦庵既謂形朽滅神飄散泯然無跡何人羞見祖宗于地下乎何物湊生氣而再生乎自相矛盾莫能解釋也史記等書曰魏武子謂兒顆曰吾死後可嫁吾妾未幾又曰吾死後須殺吾妾以為從塟已而顆從前命嫁之後顆為晉將臨敵秦將杜回忽有一老人結草以抗回顆乃擒回顆於夜間見老人來告曰我即嫁妾之亡父也公嫁我女故來報德耳春秋左傳史記世家咸謂齊襄公殺公子彭生已而襄公獵於貝丘指一物謂群從曰此大豕也群從曰此非大豕即公子彭生也襄公不信援矢射之物立而泣之果彭生也如是死生之際彰感之事左傳載之益多礼記曰人死曰鬼又曰鷹化為鳩雀化為鴿至於蒙求等書鮑靚記井羊怙識環等事皆与晦庵極相違戾從文正公與諸經史則悖晦庵從晦庵則悖文正公与諸經史令人疑惑從何而得定理嗚呼此事洞明始得抵當安可世間之心猜疑而說也橫渠謂鬼神二氣之良能程子謂鬼神造化之跡晦庵謂鬼神氣之屈伸三人之說皆是一氣之造化也夫此一氣包羅天地初無缺少充塞天地只此一氣更無兩箇一氣曰陽曰隂者只是此一氣展縮而得名也鬼神既只是此一氣則盡天地間只是一箇混沌更無兩箇蓋為盡天地間只是一氣故也然則何故有天神乎地祗乎五嶽之神乎四瀆之神乎山川之神乎社稷之神乎無祀鬼神乎歷代封禪乎古今祭祀乎鬼神如是之多也較夫三人之說則不侔矣礼記曰大皡為春帝勾芒為神炎帝為夏帝祝融為神少皡為秋帝蓐收為神顓頊為冬帝玄冥為神若㨿三人所謂二氣良能造化之跡氣之屈伸然則何必太皡等為四時之帝乎何必勾芒等為四時之神乎䦕尹子曰鬼者人死所變中庸曰鬼神之為德其盛矣乎楊子曰天地神明不測者也皆與三人之說犬不侔矣晦庵謂死者形朽滅神飄散泯然無跡然則大皡等以何為四時之帝乎勾芒等以何為四時之神乎此又不侔之極也理學類編有問人死䰟魄便散否晦庵荅曰固是散又問子孫祭祀却有感格者如何晦庵荅曰子孫是祖先之氣所以感格若㨿晦庵之說則祭五嶽四瀆山川社稷無祀鬼神者既非其子孫皆無感格耶嗚呼姜源踏人跡而生后稷簡狄吞鳥卵而生殷契伊尹生於空桑誌公生於鷹巢是誰之氣耶以誰為祖先耶爭如孔子曰未能事人焉能事鬼未知生焉知死一句推開却無過咎理學類編張程晦庵等皆屑屑然以孔子厚始反終推而廣之以論鬼神此又事極計生也大凢事務不知則已何苦欲沽虛譽強而言之住後學迷塞其心不復求明也悲哉曰師謂夢者神識也死而受苦者此神識也竊有疑焉曰子所疑者可得聞乎曰人生有睡夢也死則形氣既離何夢之有曰甚矣子之懵然不達也子之所見正類晦庵惟見形氣斷滅也形氣既能作夢死而未殯者形亦尚存何以無夢乎至於埋之火之何不知痛苦乎當知因有神識成此形氣形氣如屋神識如人去住由人屋是閑物也漢牟子曰人臨死則家人上屋呼之魂神還則復蘓不還則不蘇魂神固不滅矣但身自朽爛耳身譬五穀之根葉魂神譬五穀之種實其根葉生必當死種實豈有終乎牟子之語亦詳矣鬳齊先生曰伊川謂佛學有上達無下學余謂伊川之言亦是亦非也吾宗以悟道為要不在學問佛言千日學慧不如一日學道從上祖師不許參禪人看經教語錄文字惟令一味參究悟道實惟上達也以此論之伊川之言可謂是矣吾佛世尊說諸經卷積滿宮海藏大部花嚴有四天下微塵數偈流於大夏者百千億分之一也豈無文字乎漢唐以來歷朝三藏法師泊於佛圖澄和尚道安法師遠公和尚支道和尚生肇融叡二祖神光大師杜順和尚智者大師崇福藏法師清凉觀国師慈恩基法師圭峯密禪師南山宣律師等其道則到果位之地其才則有孔孟之文章豈無下學也以此論之伊川之言可謂非矣吾脩當自勉旃不可虛消嵗月禪宗雖謂不立文字然臨濟德山是禪宗第一等宗師觀其語錄文章經教無所不通東坡謂雪竇語錄有兩箇翰林學士之才梅屋常禪師曰周武宗廢教沙門犯顏抗爭殆數十人唐高祖時傳奕排佛惠乘法師等皇皇論爭引義慷慨亦不失法王真子之識唐武宗廢教而力爭者惟知玄法師一僧而已佛運數否難莫可免凢釋子者處變故之際無一辞可紀佛法尊如天亦吾徒朱学之罪也余聞徑山一代住持志其名凢有書記到山則以尊宿之礼待之侍僧譏其分別徑山曰書記是扶教門敵外侮之良將也吾以教門為重而然豈分別也汝等小兒安知佛法丈任之重乎侍僧再拜而已矣書記亦難任也具內外學始授其職內學心要置之末論外學可與翰林頡頑庶堪措手不尒則反邀辱矣唐季已來永明雪竇明教大覺礼法師式懺主寧僧錄圓法師黃佛印宝覚源兜率覺範東山三佛大慧高庵真歇弘智應庵密庵橘列石室北澗淮海如意萬松彥美天隱幻住天如覺隱寂照廣智梅屋古林南堂宝冽松月楚石古鼎夢堂見心恕中全室大璞一初同庵止庵用章竺隱行中祖芳隨庵圓庵德巖啟宗九皐岱宗等皆敵外侮之良將也近代人物雖不逮於古人然世與時遷人亦隨之各當其代也吾宗所謂無為者無為無不為無心而為為皆正事也豈是塊然不動乎言無學者學到萬法盡通至於無學之地惟取其理不取其語蓋為一切法相咸同一相所謂無相此無相法性相皆空俱無自性俱不可得故也豈是度日作愚人乎大部諸經皆言智為先導雖修五波羅密乃至萬行若無般若皆名魔業若志失菩提心皆名魔業佛見心乱者則令其作死屍骸骨之觀想見心不乱者則令其數息如是調攝其心也祖師凢見可於機用發明者則以禪機搆之凢見泥於文義者則令其離文字而學道凢見不知文義者則令其學智惠而明般若不然則固守僻執一愚人耳嗚呼人心如是難調理也故勞大覺垩人說許多經教對機調治故云千經論緣何事只為調治一点心凢吾緇侶自宜量其材力立其志願確乎戒德體乎佛心然後或專於悟道或兼明經旨或先學問而後發用請擇其道而行之如是修心以期成道弘傳教法以利於人可謂為僧之本等也宋理宗時靈隱癡絕冲禪師令門下之僧常衣直裰等服晝夜不釋其身臨睡則披五條袈裟囊佩大衣而臥垩朝洪武間長興僧官林禪師常衣直裰等衣日夜不離於體以一布囊安直戒牒佩之於膺惟登廁澡浴二事則以此囊懸於壁事畢復佩之宵不遺沒齒而後已虎丘行中仁禪師凢得沉檀異香則以小合貯之置於大香合中每且持以行香至世尊前於小合中另取好香一炷進之除外不復他用客至惟常香而已世有一卷註解金剛經題名曹溪六祖大師解義口訣其註語并前後序總出一己之意更非二人之語此是宋神宗元豐間天台羅適所註假垩師之名也無𭰹理有淺義盖因淺俚之故世人多愛之謬矣六祖大師法寶壇經第十付屬章曰師一日喚法海此処起首至於轉相教授勿失宗旨共計七百七十七字此是金天教之人偽造邪言增入刊板未草之弊也詳覽壇經之意只是一統說去分為十章者亦是金天所分也世有後三卷蓮經此是妄無所知匹夫所造撨歌牧唱也世有金剛經議論此是金天教之人偽造魔語也世之妄著經書者舋舋然不可勝計我亦何暇覽之偶覩四端而已彼若實言某人所作此則任其胡言漢語何必論之既假佛祖之名安可不說嗚呼妄談性理壞人心法玷辱佛祖罪莫大焉右言三師之德吾徒合遵四端之弊諸人合知是以筆之於此宋人昧佛者惟橫渠以至晦庵數人而已不昧佛者還多焉濂溪二張九成呂東萊等是也昔者漢唐已來而至於宋黃佛卬東林晦堂源大慧諸禪師等不以儒釋相分平等開導體佛之心也豈料他人將我佛法作儒法用欲皈功於自己所以轉身排佛嗚呼此機已失不勝痛惜今後吾脩或得悟道設使納交於他宗之子但以詩文交接慎勿漏泄玄機當以宋人為戒所謂前車既覆後車改轍孔子曰於予與改是国一禪師以道學傳於壽涯禪師涯傳麻衣衣傳陳搏搏傳種放放傳穆修修傳李之李傳康節邵子也穆修又以所傳太極圓授於濂溪周子已而周子扣問東林總禪師太極圖之𭰹旨東林為之委曲割論周子廣東林之語而為太極圖說周子長於禪學工夫是以工夫之道過於邵子子子長於天時曆數是以數理之道過於周子至於道學則一也初無二致曰師謂晦庵排佛者心病也所有心病乞師言之曰汝但𭰹於佛學汎及百氏之書汝當自見亦見濂溪二程以及諸子所得道學之源流矣曰諸子所得未暇問之濂溪程子所得之自乞師言之曰備說則煩姑為畧說濂溪姓周諱惇頤字茂叔舂陵人也初扣黃龍南禪師教外別傳之旨南諭濂其略曰只消向你自家屋裡打點孔子謂朝聞道夕死可矣畢竟以何為道夕死可耶顏子不改其樂所樂者何事但於此究竟久久自然有箇契合處出附章氏家譜濂一日扣問佛卬元禪師曰畢竟以何為道元曰滿目青山一任看濂擬議元呵呵笑而已濂脫然有省出資鑒并佛卬語錄後跋濂聞東林總禪師得竹林壽涯禪師麻衣道者二師心傳易學窮神極性由是扣之總諭濂其畧曰吾佛謂實際理地即真實無妄真而無妄即誠也大哉乾元萬物資始資此實理乾道變化各正性命正此實理天地垩人之道至誠而已必要著一路實地工夫直至于一旦豁然悟入不可只在言語上會濂一日與張子厚等同詣東林論性總曰吾教中多言性故曰性宗所謂真如性法性性即理也有理法界事法界理事交徹理外無事事必有理諸子沉吟未決濂毅然出曰性體冲漠惟理而已何疑耶橫渠曰東林性理之論惟我茂叔能之出弘益紀聞濂問大極總曰易在先天無形有理盖太極即易也無形之理即無極也天地間只是一氣進退而為四時以一氣言之皆元之為也劉時中所得東林親筆論易之語又尹氏家塾及蘓季明茟記詳備并有程子𭰹愛元包四德之語五峯胡先生序通書謂濂得太極圖於穆修修得於种放放得於陳搏此其學之一師也明說太極圖非濂所作陳搏之學得於麻衣衣衣得於壽涯禪師出性斈指要并正易心法濂問太極圖之所由緫曰竹林壽涯禪師得国一禪師之心傳其來遠矣非言事物而言至理當時建圖之意㨿吾教中依空立世界以無為萬有之祖以無為因無即所依之空以有為果有即二氣交運以真為體真即一真至理以假為用假即萬物化生故云無極之真妙合而疑濂復造佛卬之室敘及悟由曰吾多教人孔孟之大義今公所負可以起之宜力行無滯東林亦有諭濂倡儒為道學之語出松窓雜記濂諭學者曰吾此妙心實得啟迪於南老發明於佛易道義理廓達之說若不得東林開遮拂拭斷不能表裡洞然該貫弘矣出尹氏家塾并性學指要濂徃潮冽靈山寺訪大顛禪師遺跡見韓子上大顛書累幅併存及留衣亭肅然無恙故題詩曰退之自謂如夫子原道𭰹排釋老非不識大顛何似者數書重更留衣出性理群書并靈山寺留衣亭真跡濂作愛蓮詩曰佛愛我亦愛清香蝶不偷一般奇絕處不上婦人頭出鄭谷集濂性簡約乎居澹如也晚年悉屏文字惟務靜勝而卒得道學之傳濂溪行狀東林教人惟務靜勝濂溪之久不事筆硯終日端坐窓前草也同一生意盖是靜中有得弘益紀聞道學性理之始實倡於涯師而至于緫師緫以授周子弘益紀聞陳忠肅公曰性理之說東林授之濂溪溪溪廣之其言遍於佛書中錄并性學指要後村劉先生詩云濂溪學得自高僧又云始知周孔外別自有英豪出後村集程子洛中人諱顥字伯淳号明道弟諱頥字正叔號伊川子野曾先生曰程氏顥頥同受學於濂溪濂溪首令尋仲尼顏子所樂何事學成各以斯文為己任出史畧等程子以太極圖授之後山先生後山曰余觀周程推己教人之所以及反觀孔孟以來實未嘗有此寂默危坐做工夫尋樂處以為斯文之窮究信乎周程體道之源固有所別流矣趙說之心學淵源後跋明道𭰹味於華嚴合論自謂有所心融意會為喜以其所由書於雲盖寺雲盖寺碑刻墨跡明道以亡母壽安院君恩辰徃西京長慶寺修冥福躬預齊席見眾僧入堂周旋步武威儀濟濟伐皷敲鐘內外整肅一坐一起並準清規乃嘆曰三代禮樂盡在是矣弘益紀聞源清禪師荅伊川書曰麦羕過𦗟以知道者見期雖未一奉目擊之歡聞公留心此道甚久天下大宗師歷扣迨遍乃猶以鄙人未見為不足頃年間聞先師言公見處今覽公所作法要後序𭰹觀信入真實不虛也出源語錄先師即晦堂心禪師也晦堂嘗以心法授伊川已而伊川多入源之室嘉泰普燈錄云程伊川徐師川朱世英洪駒父咸問道於源禪師故伊川之作文註書多取佛祖辞意信源流之有從也石塘胡汲仲先生曰孟子沒一千五百余年道潛統絕子周子出然後潛者復光者復續河南程氏二子得周子之傳周子之傳出淤北固竹林寺壽涯禪師而為首倡程子四傳而得朱氏文公公公復得張敬夫講究此道方得脫然處乃云前日所聞竹林遺語未之契者皆不我欺元來此事與禪學十分相似學不知禪禪不知学𢆰相排擊都不曾劄著病處亦可咲也胡氏大同論歐陽玄曰程子平生愛讀佛書但不及朱氏之覧歐陽記錄伊川曰明道先生出入釋老幾十年伊川所作明道行狀東林諭濂有一中散為萬事未復合為一理及天理之性人欲之私天地萬物本吾一體元包四德誠通誠復等辭二程傳其學故伊川著書立言皆本其意或全用其語如易傳序體用一源顯微無間此二句出唐清凉國師華嚴經䟽濂溪太極圖說無極之真妙合而凝此二句出華嚴經法界觀無極而太極等語全是東林口訣周子通書濂洛集等皆根於此周程取用佛語多類此也晦庵𭰹諱周程明露佛語故云周子之學莫知其師傳之所自又云周子之學得之於天且夫周子通書師友章云至難得者道德有於身而已矣求人至難得善有於身非師友則不可得也晦庵之言悖於周子之語矣意在絕其所得之自殊不知昧於天理愈令節病彰焉有若韓子見大顛後所有敬佛之辭後人刪而去之晦庵校韓文尚留韓子上大顛三通書後人再刊又將此三通書一併刪去故知後人既服晦庵之藥執迷於排佛左甚於晦庵爭知晦庵設此関竅曲排之也後人不識其所以然將謂是實從實而排之所謂一人傳虛萬人傳實也咾呼晦庵設箇関竅在此後人尚識不破爭得如薛簡張拙白居易杜鴻漸李習之韓昌黎陸亘陳操李附馬楊大年富鄭公楊次公郭公輔趙清獻公周濂溪張無盡馮濟川張九成呂居仁諸大儒等能參吾宗之禪関乎敬佛法明佛理惟未透禪関者有若許玄度習鑿齒宗炳劉遺民雷此宗王導周顗沈休文張說李太白王摩詰柳子厚王渤李源呂蒙正范仲淹范𦉹公文潞公張約齊呂東萊等是也以佛學為通家之好者者若曹子建王洵王珉文中子杜子美杜牧之孟浩然劉禹錫劉長鄉司空曙司空圖李群王皮日休許渾賈鳥項斯鄭谷等是也佛法苟非大道若能感諸名賢如是崇尚者也諸賢才德明敏豈不逮於後世排佛之人乎苟不取於諸賢之大公耳屈於一人半人之己意者實未思之誤也曰師謂諸子參禪明佛理者皆賢德君子也惟柳子在八関十六子之列乎曰柳子明理君子也有人謂韓子文勝於柳柳子詩勝於韓二子之名並驅於世此亦評之未詳也文藝雄徤者韓過於柳也理學妙密者柳過於韓也後世理學不通者不能窮柳子之文二蘓子王荊公輩優於理學所謂合節矣其與劉禹錫易地而官以便其奉此德又餘人之所難行也惟失所於王叔文故著其名於十六子之列柳子於德宗貞元十九年為監察御史裡行彼時王叔文韋執誼用事二人奇柳子之才擢為礼部員外郎欲大用之非妄求也俄而叔文敗柳子與劉禹錫等七人俱貶柳子為永列司馬至憲宗元和十年徙柳列刺史也柳子與薛孟容書曰宗元狼忤貴近蹈不測之事此丈人所聞見不敢與他人道又與裴塤書曰僕卑甞與游者居權衡之地十薦賢幸乃一售不得譸張排恨僕可出而辨之哉又與李夷簡書曰宗元得罪之由致謗之自以閣下之明其知久矣又祭妻父楊詹事文曰宗无謗言未明黜伏逾紀即此觀之亦足以見其被排謗之機章章然明且著矣何待史氏之說乎况柳文篇篇正大學海瀰𭰹断無𨦣氣𢔒之咎過於他人遠矣實有道之人也嗚呼鳳凰不與眾羽同類眾羽亦不識鳳凰之貴故有疑忌之思也伺求柳子之過乘便而搦之可勝道哉歐陽唐書重而擠之溫公通鑑晦庵綱目從而抑之虧其美德也賴有天不可欺冥冥之中各有前程去處晦庵所用佛語若虛不昧此句出唐譯大智度論并禪書不可限量出華嚴宝積大集等經似是而非出鐔律集大學補闕全是禪語畧變之始言一理中散為萬事未復合為一理真實無妄真實之理有是理而復有是事天地之理至實無妄垩人之心至實無妄皆是東林口投周子語意能知覺所知覺楞嚴經等千垩相傳心法脫然有悟處又非見聞思慮之可及也物我一理固有之性心之體一用吾心正而天地之心亦正萬物之本原一心之妙用活鱍鱍地徹頭徹尾做工夫到這裏咬菜根無縫三句語劄著病處一刀兩叚一棒一條痕一摑一掌血皆出禪書并詣經註復卦引楞嚴經語為証拠云非惟年有變月亦有之云云出周易附鑟纂注晦庵註書惟毛詩一經乃是學力註成簡用佛法自餘四書等註并諸製作皆用佛法汍以佛經禪語改頭換靣變其語而取其意如是用者逼於群書晦庵如是所用佛語又諱周程明露佛語不識晦庵是何心哉晦庵早從學於延平李先生父之恨不發明及詢長者咸指之禪學已而徧謁禪老與呂東菜張南軒同問道於大慧禪師出大惠年譜後晦庵十八歲從劉屏山遊屏山意其必留心舉業遂搜其篋惟有大惠禪師語錄一怢耳次年登科出左焴所作大惠語錄序井拱辰集等書晦庵致書於開善謙禪師曰熹向蒙大惠禪師開示狗子佛性話頭末有悟入願授一言警所不逮謙荅書曰把這一念提撕狗子話不要商量勇猛直前一刀兩叚晦庵覽之有省出資鑑拱辰集性理群書晦庵於竹林小軒誦佛經作詩曰端居獨無事聊披釋氏書暫息塵累牽超然與道俱門掩竹林幽禽鳴山雨餘了此無為法身心同晏如出朱子大全集并道餘錄晦庵有書啟國清禪師曰寒山子詩刻成日幸早見寄字蹟見舊本寒山詩後晦庵寄山居僧詩曰方丈翛然屋數椽檻前流水自清蓮蒲團竹几通宵坐掃地焚香白晝眠地窄不容揮麈客室空那許散花天箇中有句無人薦不是諸方五味禪出事文類聚陸文安公九淵每與晦庵爭論太極圖說盖知晦庵有禪學故謂晦庵有悟入譏之出史畧等有問今士大夫都入禪家去者何也晦庵荅曰是他高似伱伱平生讀許多書記誦文章所藉以取功名利祿之計者到這裡都靠不得所以被他降下了王介甫平生學許多道理臨了捨宅為寺本朝李文靖公王文政公劉元城呂申公都是甚麼人也都去入他禪學佛法說六根六識四大十二緣生之論皆極精妙故曰此謂孔子所不及也四大即是魂魄十二緣生出華嚴合論佛說本言盡去世間萬事後却說出實際理地不受一塵萬事門頭不捨一法達磨盡翻窠臼倡為禪學與義學尤為高妙金剛經大意只在須菩提問云何應住云何降伏其心兩句上故說不應住法生心不應住生心禪宗有云有物先天地無形本寂寥能為萬象主不逐四時彫撲落非他物縱撗不是塵山河及大地全露法王身若人識得心大地無寸土看他是甚麼樣見識今區區小儒怎生出得他平宜其他為揮下也朱子語錄并易解歐陽公雜記性理群書晦庵如是於佛學又教人棄於佛學此亦不識晦庵是何心哉言語煩者不𠬧鳴道集道餘錄割過者亦不𠬧惟竹軒誦佛經之詩簡座亦收於此右言晦庵自用佛語又諱周程明露佛語自於佛學又教人棄於佛學此二章微露晦庵心病也汝若浹洽貫通全體皆見始知周程張謝游楊晦庵等著書立言凢於說道理處寸寸節節皆是佛經禪語之意豈不見陳忠肅公謂性理之說東林授之濂溪其言遍於佛書也近有一箇半亇指禪語曰此一篇與宋儒言語相合這幾句亦與宋儒相合嗚呼曾不知宋儒言語盡是禪宗流將出去者也曰師之所言皆出吾儒之書非存私也非不公也且言世之排佛者可是學力之未乎可是理學之未通乎可是學佛未至而反排乎可是紀昌之用心乎可是局於此量不能化之而大通乎嗚呼尚亦不敢輕於常人安忍欲沽自己之幻名曲排三界大垩人度人之大法吾為之憂憂彼排者虧損隂德至於至也曰中也亦知周程道學得於禪宗傳至晦庵不越其教不知晦庵何以昧佛之德反而排之曰濂溪窮究道學於黃佛東林三禪師也夫三師者端人也其取友必端矣濂溪取友亦必端矣况程子多游禪室多讀佛書固知程子必是慎德君子不肯叛佛晦庵立言汎用佛理反而排之者俾人不識也是故遮掩周程學佛之根然亦遮掩不盡中庸或問謂楊氏等受學於程門其言皆佛老之余緒多說游楊謝氏等言出於佛老晦庵明知周程楊等道學出於禪宗適之所謂其所排者設墻壍也曰師謂讀佛書便識晦庵心病竊疑師欲羅籠人入佛之意不知然否曰佛法如大路凢欲於此路行者亦不拒之不欲於此路行者亦不邀之學佛者得佛法之饒益佛亦無喜背佛者不得佛法之饒益佛亦無慍從佛背佛在乎人之有善根無善根而已安可力致其然欤北溟有鯤化而為鵬聽其自化也豈人力能俾其化焉人之從佛亦何益於我乎人之背佛亦何損於我乎曰佛經中語有與老莊相似者晦庵謂佛經剽竊其說此意何如曰佛是天上天下三界大聖人也大道周圓萬德統備見人之所不見明人之所不明故有窮妙道之極談𣫆秘𧷤之玄奧豈藉老莊之言以為用乎而况歷朝三藏法師多生西竺未嘗善吾中國之書惟解中國之語是故到吾中國譯梵經而為中國之語而已譯梵經者如番邦所用通事人也只將梵語轉作唐言孰敢變亂佛聖人所說之辭而壞其經旨乎佛生周昭王時老子生周定王時老子後於佛四百余年矣且夫前人竊後人之語耶後人竊前人之語耶顛倒荒唐惑諸後學道家除老関莊列之外諸經皆是後人採摭佛經之意造成道經晦庵欲蔽佛之光明千方百計反而抑之也人雖可瞞天不可欺也鬳齊先生曰佛出西方豈應於此剽竊抵佛抵之太過不公矣出列子註曰除晦庵外亦有排佛者此復何如曰自無主見不能識其道之𭰹淺惟憑晦庵之說從而排之是為隨人脚跟轉也曰亦有不因晦庵之說自欲排者此復何如曰譬如世人惟識常見之物不識難見之物忽過明月之珠夜光之璧光華璀璨流輝奪目不識是寶疑之為恠尋握利劍猛力而拒之爭知此物能使貧者富賤者貴有如是功與德也亦猶𥌒者不見日月之光欲令盡天下人皆𥌒其目同說日月無光明也曰師謂或者曲罪柳子辨之明矣爭奈亦罪王維乎曰王維陷於漁陽不得已而処之落他網中不得不爾然後潛求良䇿脫身還國之計也曰王維何不就死胡為而存之曰此時玄宗蒙塵於蜀肅宗搆朝二主皆未遑寧處王維安忍棄君而就死地乎顏淵告孔子曰子在回何敢死此之謂也武陷於匈奴雖持漢節亦受匈奴之制落他網中不得不爾此亦不忍棄君而就死地也王維武易地則皆然惜乎後世不求其長而求其短故罪王維若以天理神明之鑒鑒之則不可罪王維也曰師謂刘坦之等惟識杜公之學未識李公之學然二公之學何以異焉曰韓子亦言李杜文章光𦦨丈曾無優劣之分但子美長於作法見識蒼古太白長於神妙見識廓達兼有道味如之無形迹可見而能裂山填水興雲布雨活法變化不同凢獸之被人捕者也後世仰之彌高莫能近傍所以謗之選詩補註坦之去取之間極欠子細唐詩未暇論之宋詩惟𠬧晦庵之作宋人為用佛家性理故不類古詩所以元人非之當知唐詩可學宋詩難學元人不能繼宋反以非之亦氣運之變也然晦庵詩文專用佛家性理巴巴認著影響不知實處如明教禪師之所謂似是而非也坦之獨取其詩不識坦之從何立意盖坦之不明道眼故不能將宋人稱斤定兩逐箇識破由是區區蒲伏於晦庵脚跟之下也嗚呼苟能從佛法大海中挨拶得透回視晦庵自知之矣近世達之者未言成道元本中峯且言宋景濂亦能默而識之不露齒也曰師謂晦庵欲掩濂溪之學得於禪宗故云得之於天師之確論愚猶未達𭁡乞明誨啟沃愚癡曰佛是三界大垩人尚從然燈佛授記作佛孔子為萬世師法亦問於老子學之不厭誨人不倦好古敏以求之者也玄䇿禪師曰無師自悟者天然外道也古之垩人尚倚河圖洛書以成文籍觀天地察物理以定隂陽量日影等盈虧以成曆數未嘗得之於天也子夏答魯哀公曰臣聞黃帝學乎太真堯学乎伊壽舜學乎務成跗禹學乎西王國湯學乎𭑿子伯文王學乎鉸時子斯武王學乎郭政周公學乎太公望自開闢已來豈有得之於天者乎周子惟有淳厚之德於黃佛印處得些子禪學於東林禪師處得傳易學并說明太極圖之意旨由是為一代明公短中求長而已何以昧其根本而謂得之於天斯言文謬欺編後学甚矣曰師謂隂符經近老莊何以拠焉曰其大高古其旨明道作者非黃帝則老関非老関則莊列餘人不能也邵子謂七國時書亦非也伊川謂非商末則周末斯言庶幾矣晦庵謂唐李筌所作何其昧哉古人亦無此作况唐人乎晦庵又言此書有強兵戰勝之術斯言益昧矣此書全說道理斷無兵機雖嘗有云天發殺機龍蛇起陸人發殺機天地反覆天人合發萬化定基此言心法幾微一動一靜與天時流行之道冥一脗合無過與不及之謂也豈兵機之謂乎且兵法起於黃帝其書雖不及見犬率不外乎太公望之三畧六韜孫子武之十三篇也至於具起司馬法尉繚子之兵法亦不外乎此孫龐樂毅起翦頗牧韓信霍生諸葛魏武謝安桓溫之用兵亦不外乎此唐太宗與李靖講明至矣得矣征伐之理興仁義去暴亂正國土以救民不得已而用之豈合宜之事乎故云戰德戰仁義未言戰兵也武經格戰之理觀天時察地利任之以勇智固之以仁信秉之以忠義正兵奇兵之變臨事換機擊其虛避其實以佚待勞以近待遠以飽待饑無恃強以勇進無怯威以速退可攻則攻可守則守活法變化機用無窮以隂符經較之猶天之與淵大不侔矣盖晦庵有學之才兼得些子佛學後人不逮故服其言不能擇其善不善也曰虛無寂滅之理晦庵曾用否曰用矣虛無寂滅之理者靜而無念也晦庵云人生而靜天之性也感於物而動性之欲也詩傳序又云靜能生動便是漸漸恁地消去又漸漸恁地長隂符經註此即變用虛無寂滅之語惟變其語不變其理晦庵如是明擠暗用脉脉不斷盖晦庵將虛無寂滅之理以為說性理之根本故也曰師之言至矣吾儕不能自省覺爾凢慢佛者鮮有不嬰折挫者焉或致名位不進或進而復墜設不墜亦貧困或中途夭閼或子孫乖蹇或遭隂罹天譴也世人酣迷不能覺察耳盖受晦庵之所繪也晦庵亦償此感於趙宋光宗紹熙間累官列邑而已寧宗召除煥章閣待制兼侍講甫四十六日遽卒理宗追諡文公焉嗚呼以其文義欲欺三界大垩人度人出生死成道果生福德開知慧眾德統備之大法耶豈非𭰹悖天理乎曰晦庵亦論性論道豈惟文義乎曰濂溪問性於東林禪師師曰性即理也東林以性之𤨏未應酧而已理之一言豈能盡性之道哉猶曾子曰夫子之道忠恕而已矣忠恕之言豈能盡夫子之道哉此亦應酧而已濂溪以性即理之一言取足於心授之程子後來晦庵倚恃其說乃曰性即理者為千萬世說性之根基中庸曰天命之謂性率性之謂道晦庵註云命猶令也性即理也率循也如是亦兼訓字而已矣以即理之所言指之為性循此即理指之為道晦庵以此𤨏言釋副中庸之義也嗚呼安得子思子再生於世論此道哉曰晦庵門弟子蔡仲默等不甚排佛何以師徒之不同耶曰自東漢南北朝而來諸子雖通佛學未克多以佛理著書作文惟以佛理脩心道吟詠性情而已宋儒潛心佛學著書立言皆用佛理所以儒學至宋大變變為道學發明四書六經也晦庵宗於程子是故今日惟說周程所得之源不言諸子之所從也請觀戰國之下荀卿呂不韋司馬遷賈誼董仲舒劉向楊雄班固等語不越六經孔孟老莊之意至於永平年間佛法入中國之後范曄曹植許玄度陶淵明王維李翱等語已入佛學矣故有評佛論皈去來辞結廬在人境中嵗頗好道復性書等語至於楊億楊傑二蘓濂溪橫渠二程及上蔡龜山東萊南軒晦庵等語渾用佛學故有寂默危坐做工夫尋樂處識神靈性虛而靈寂而妙返本還源用力之久一旦豁然貫通焉無極而太極無極之真體用一源等語所以晦庵與門弟子皆未排佛晦庵盖為汎用佛意欲掩佛學之德全皈自己之功故立排佛之言栽於書中令人信伏後人披覽承虛接響排之而已排佛用此逢蒙之計者起於張子厚謝良佐楊中立張敬夫等廣之於晦庵也曰然則張子厚等排佛之語吾師何不弁明而正之曰屏山李學士鳴道集言之詳矣曰韓子排佛之說吾師何不辨明而正之曰當時大顛禪師言之詳矣曰石介說恠吾師何不辨明而正之曰如意邁禪師荅石記言之詳矣至於嶷禪師甄正論嵩禪師輔教編非韓篇相國無盡張公護法論妙明成禪師折疑論靜齊劉學士三教平心論千瀬禪師顯正論邁禪師辨偽錄少師烑公道余錄諸公互加發明益詳矣先德未言者今日為子言之而已曰中也雖不敏亦知佛法不可排也世之排者致令後學失其善心於天理何如哉曰佛法者生育天地之大本至宰萬化之靈機上窮空界下徹地輪莫非佛法之所統搆如是大道何懼排乎譬如大海能容百川之水亦容諸雜穢流若穢若清咸成一味有如是德故名為海佛法亦然毀譽不動以見佛法之大也詩曰公孫碩膚赤舄几几此之謂也觀其力排之意速去佛法掃土而盡爭知愈排愈盛愈抑愈揚猶張一掌擬掩太陽徒奮身努力而不能掩太陽少許之光明惟損自己之德耳又如仰靣噀天自污其首逆風揚塵自坌其己然則何益矣當知排佛法者眾人也王天下者垩人也大道在垩人作興此天地一定之理堯典曰放勳欽明文思安安允恭克讓光被四表格于上下泰誓曰天佑下民作之君作之師也歷代帝王祖述其道撫育萬邦其揆一也佛法大道之學教人為善也是以歷朝崇尚至我聖朝以皇極而致治以佛心而致仁太祖皇帝加板的嗒和尚為國師太宗皇帝加大寶法王為上師仁宗皇帝加光法師為法王宣宗皇帝加慈恩和尚為上師今上皇帝加揚國師為上師聖量高明天然正性恢弘佛法利益世人佛法苟無益於天下安得如是之感乎曰師謂佛法利益世人不知有何利益曰參禪悟道者得明心見性之益窮究經教者得明通玄旨之益依法脩行者得漸入菩提之益持戒念佛者得生淨土之益持戒禪定者得生天上之益皈依信受者得善根福惠之益善心敬佛者得善回福果之益依信佛法者不作諸惡得不煩刑法之益佛法行於世間得隂翊皇度之益此是體乎三教垩人之心與天地神明至公無私之意余以慈悲方便令汝知之慎勿亦效逢蒙紀昌之用心也自喪其德惟是一身之咎苟或教壞世人倣而排之是則招回𭘧果罪不可逃矣曰罪福果報死生等事此皆佛書之語吾儒不信也曰豈特佛書有是語乎大禹謨曰惠迪吉從逆㐫伊訓曰作善降之百祥作不善降之百殃坤之文言曰積善之家必有余慶積不善之家必有余殃子曾子曰人之好善福雖未至去禍遠矣人之為惡凶雖未至去禍近矣豈非罪福果報乎繫辞曰死生之說精氣為物游魂為變孔子又謂子路曰未知生焉知死豈非論死生之事乎子乃輕於聖人之訓重於後人之言謂無罪福果報死生等事壞其心術也不愧罪禍則無德矣無德安能進道大哉佛法眾德統備世人獲其善利不知報恩反生誹謗甚於子之刃父也汝知之乎曰余改轍矣豈復蹈彼蹊乎復持此意諭諸朋輩令彼知非免罹害德之咎益感吾師之德其𭰹與愽不可極其涯涘矣曰師謂三教聖人各出隻手扶持大道以成天下之化此切論也仰瞻聖上制法行事三宗並弘夫天下之人咸推此理即契天地聖人之心也曰子言善矣聖上明逾日月量同天地道齊堯舜德邁商周𭜴和萬邦平章百姓追回上古四五千年之淳朴喚醒末学二三百載之沉迷車同軌書同文混一區宇儒崇仁老崇理咸契佛心上符列垩之鈞謨廣被至仁之厚德仰願淳風政化永垂世無疆之大猷垩子神孫克紹一定不遷之洪業鈞陶萬化時歌有道之昇平共樂泰和日頌無為之至治永貽厥德克配天心者焉正統五年五月中澣日中吳沙門空谷景隆著萬曆庚子季冬朔且重刊板存方肆廣印流通
